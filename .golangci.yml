---
version: "2"

run:
  timeout: 5m

linters:
  # "standard" enables errcheck, govet, ineffassign, staticcheck and unused.
  default: standard
  enable:
    - misspell
    - unconvert

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/bubu11e/popcorn
